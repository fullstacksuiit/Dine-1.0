{% extends "base_public.html" %}

{% block title %}Order Status Checker{% endblock %}

{% block content %}
<div class="min-h-screen flex items-start justify-center pt-12 px-4">
  <div class="w-full max-w-md">
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary-50 mb-4">
        <svg class="w-8 h-8 text-primary-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">Check Order Status</h1>
      <p class="text-gray-500 mt-1 text-sm">Enter your invoice number to track your order</p>
    </div>

    <!-- Search Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <label for="bill_id" class="block text-sm font-semibold text-gray-700 mb-2">Bill / Invoice Number</label>
      <input
        type="text"
        id="bill_id"
        placeholder="e.g. 25-26/001"
        class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-sm font-semibold focus:ring-2 focus:ring-primary-100 focus:border-primary-500 transition-all outline-none mb-4"
      />
      <button
        id="checkStatusBtn"
        onclick="fetchStatus()"
        class="w-full bg-primary-500 hover:bg-primary-700 text-white font-bold py-3 px-6 rounded-xl transition-all duration-200 shadow-sm hover:shadow-md text-sm"
      >
        Check Status
      </button>

      <!-- Status result area -->
      <div id="status" class="mt-5 min-h-[48px]"></div>
    </div>
  </div>
</div>

<style>
  .status-card {
    background: linear-gradient(135deg, #f9fafb 0%, #f5f3ff 100%);
    border-radius: 1rem;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    font-size: 0.95rem;
    color: #374151;
    animation: fadeIn 0.4s ease-out;
    border: 1px solid #e5e7eb;
  }
  .status-label { font-weight: 600; color: #6c63ff; margin-right: 6px; }
  .status-badge {
    display: inline-block;
    border-radius: 999px;
    padding: 4px 16px;
    font-size: 0.85rem;
    font-weight: 700;
    color: #fff;
    background: #818cf8;
    text-transform: capitalize;
  }
  .status-badge.READY { background: #22c55e; }
  .status-badge.IN_PROGRESS { background: #eab308; color: #713f12; }
  .status-badge.COMPLETED { background: #16a34a; }
  .status-badge.CANCELLED { background: #ef4444; }
  .status-badge.PENDING { background: #fbbf24; color: #78350f; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
{% endblock %}

{% block extra_js %}
<script>
let lastStatus = null;
let lastBillId = '';
let autoRefreshInterval = null;
let userInteracted = false;

let audio = document.createElement('audio');
audio.src = 'https://cdn.pixabay.com/audio/2024/03/15/audio_197b7e7bfa.mp3';
audio.preload = 'auto';
audio.style.display = 'none';
document.body.appendChild(audio);

function playNotificationSound() {
    if (!userInteracted) return;
    try {
        audio.currentTime = 0;
        audio.play().catch(() => {});
    } catch (e) {}
}

function fetchStatus(isAuto = false) {
    const billId = document.getElementById('bill_id').value.trim();
    const statusDiv = document.getElementById('status');
    if (!billId) {
        statusDiv.innerHTML = '<p class="text-red-500 text-sm text-center">Please enter the Invoice Number.</p>';
        if (autoRefreshInterval) clearInterval(autoRefreshInterval);
        return;
    }
    statusDiv.innerHTML = '<p class="text-gray-400 text-sm text-center">Fetching status...</p>';
    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const restaurantId = pathParts[pathParts.length - 1];
    if (!restaurantId) {
        statusDiv.innerHTML = '<p class="text-red-500 text-sm text-center">Restaurant ID not available in URL.</p>';
        if (autoRefreshInterval) clearInterval(autoRefreshInterval);
        return;
    }
    const url = `/sale/api/bill-status/${encodeURIComponent(restaurantId)}?invoice_number=${encodeURIComponent(billId)}`;
    fetch(url)
        .then(response => {
            if (!response.ok) throw new Error('Bill not found or error fetching status.');
            return response.json();
        })
        .then(data => {
            if (data.exists) {
                let badgeClass = 'status-badge';
                let status = (data.kot_status || '').toLowerCase();
                if (status.includes('pending')) badgeClass += ' PENDING';
                else if (status.includes('progress')) badgeClass += ' IN_PROGRESS';
                else if (status.includes('complete')) badgeClass += ' COMPLETED';
                else if (status.includes('cancel')) badgeClass += ' CANCELLED';
                else if (status.includes('ready')) badgeClass += ' READY';

                statusDiv.innerHTML = `
                <div class="status-card">
                    <div><span class="status-label">Invoice #:</span> ${data.full_invoice_number}</div>
                    <div><span class="status-label">KOT Status:</span> <span class="${badgeClass}">${data.kot_status || 'N/A'}</span></div>
                </div>
                `;

                if (isAuto && lastStatus !== null && data.kot_status !== lastStatus) {
                    let audioPlayed = false;
                    let notifShown = false;
                    try {
                        playNotificationSound();
                        audioPlayed = userInteracted;
                    } catch (e) {}
                    try {
                        notifShown = showStatusNotification(data.kot_status);
                    } catch (e) { notifShown = false; }
                    statusDiv.innerHTML += `<div style="color:#fff;background:#6c63ff;font-weight:600;margin-top:0.7em;padding:0.7em 1em;border-radius:12px;">Order status changed: ${data.kot_status}</div>`;
                    if (!notifShown || !audioPlayed) {
                        statusDiv.innerHTML += `<p class="text-red-400 text-sm mt-2">\u26a0\ufe0f Push notification and/or sound may not be supported on your device/browser.</p>`;
                    }
                }
                lastStatus = data.kot_status;
                lastBillId = billId;

                if (!autoRefreshInterval) {
                    autoRefreshInterval = setInterval(() => {
                        if (document.getElementById('bill_id').value.trim() === lastBillId) {
                            fetchStatus(true);
                        } else {
                            clearInterval(autoRefreshInterval);
                            autoRefreshInterval = null;
                        }
                    }, 30000);
                }
            } else {
                statusDiv.innerHTML = '<p class="text-red-500 text-sm text-center">Bill not found.</p>';
                if (autoRefreshInterval) {
                    clearInterval(autoRefreshInterval);
                    autoRefreshInterval = null;
                }
                lastStatus = null;
            }
        })
        .catch(err => {
            statusDiv.innerHTML = `<p class="text-red-500 text-sm text-center">${err.message}</p>`;
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
            }
            lastStatus = null;
        });
}

if ('Notification' in window && Notification.permission !== 'granted') {
    document.addEventListener('click', function notifPermOnce() {
        Notification.requestPermission();
        document.removeEventListener('click', notifPermOnce);
    });
}

function showStatusNotification(status) {
    if (!('Notification' in window)) return false;
    if (Notification.permission !== 'granted') return false;
    let message = '';
    let icon = 'https://cdn-icons-png.flaticon.com/512/190/190411.png';
    switch ((status || '').toLowerCase()) {
        case 'pending':
            message = 'Your order is pending. Please wait.';
            icon = 'https://cdn-icons-png.flaticon.com/512/595/595067.png';
            break;
        case 'in progress':
            message = 'Your order is being prepared!';
            icon = 'https://cdn-icons-png.flaticon.com/512/1046/1046857.png';
            break;
        case 'ready':
            message = 'Your order is ready for pickup!';
            icon = 'https://cdn-icons-png.flaticon.com/512/190/190406.png';
            break;
        case 'completed':
            message = 'Order completed. Thank you!';
            icon = 'https://cdn-icons-png.flaticon.com/512/845/845646.png';
            break;
        case 'cancelled':
            message = 'Order was cancelled.';
            icon = 'https://cdn-icons-png.flaticon.com/512/753/753345.png';
            break;
        default:
            message = `Order status changed: ${status}`;
    }
    try {
        new Notification('Order Status Update', { body: message, icon: icon });
        return true;
    } catch (e) { return false; }
}

document.getElementById('checkStatusBtn').addEventListener('click', function() {
    userInteracted = true;
});

window.addEventListener('DOMContentLoaded', function() {
    var isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
    var isiOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    if (isSafari || isiOS) {
        let statusDiv = document.getElementById('status');
        statusDiv.innerHTML += '<p class="text-gray-400 text-sm mt-3">\u26a0\ufe0f For best experience, allow notifications and keep this page open.</p>';
    }
});
</script>
{% endblock %}
